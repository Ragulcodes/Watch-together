# LiveKit server config for docker-compose. For production use strong keys and
# set rtc.use_external_ip: true (and open the UDP port range on your firewall).
port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false
redis:
  address: redis:6379
keys:
  devkey: watchtogetherdevsecret0123456789abcd
logging:
  level: info
