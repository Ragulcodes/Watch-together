name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build-test:
    name: Typecheck · Build · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-placeholder

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wt
          POSTGRES_PASSWORD: wt
          POSTGRES_DB: watch_together
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wt -d watch_together"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://wt:wt@localhost:5432/watch_together?schema=public
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: ci-e2e-secret
      # Token minting is offline JWT signing — no live LiveKit server needed for these specs.
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      LIVEKIT_URL: ws://localhost:7880
      NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
